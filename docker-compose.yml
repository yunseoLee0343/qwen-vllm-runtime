services:
  qwen-vllm:
    image: vllm/vllm-openai:latest
    # runtime: nvidia is required for non-RunPod Docker hosts.
    # On RunPod, GPU access is already available and this line may be
    # unsupported — comment it out if the pod reports an unknown runtime.
    runtime: nvidia
    ipc: host
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - "${MODEL_ROOT:-/workspace/models}:/models:ro"
    environment:
      HF_HOME: /models/.cache
    command:
      - --model
      - ${MODEL_PATH:-/models/qwen3.6}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-qwen3.6}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --dtype
      - ${DTYPE:-auto}
      - --max-model-len
      - "${MAX_MODEL_LEN:-8192}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - --tensor-parallel-size
      - "${TENSOR_PARALLEL_SIZE:-1}"
